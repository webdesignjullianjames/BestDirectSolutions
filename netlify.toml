[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Vite 8 requires ^20.19 || >=22.12. Pinned so a change to Netlify's default
  # image cannot silently move the build onto an unsupported runtime.
  NODE_VERSION = "22"

# The app routes client-side with react-router-dom, so paths like /about, /team
# and /contact have no file behind them on disk. Without this rule Netlify would
# 404 anyone who deep-links, refreshes, or hits those URLs from search — only
# the bare "/" would work. The 200 status rewrites rather than redirects, so the
# browser keeps the real URL and React Router resolves it on the client.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Hashed build assets are immutable — Vite renames them on every content change,
# so they can be cached hard. Everything else keeps Netlify's default headers.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
